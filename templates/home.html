{% extends 'base.html' %}
{% block title %}Home{% endblock %}

{% block content %}
<div class="container" style="max-width:700px;">

    <div class="card" style="text-align:center; padding:70px 50px;">

        <h1>AI-Assisted Security Review</h1>

        <p class="subtitle" style="max-width:500px; margin:0 auto 40px auto;">
            AI-powered security scanning for CI/CD pipelines.
        </p>

        <div style="display:flex; gap:12px; justify-content:center;">

            <a href="/login" style="flex:1; max-width:180px;">
                <button>Sign In</button>
            </a>

            <a href="/register" style="flex:1; max-width:180px;">
                <button style="background:white; color:#111111; border:1px solid #d1d5db;">

                </button>
            </a>

        </div>

    </div>

</div>
{% endblock %}
